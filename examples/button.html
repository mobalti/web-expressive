        /* Showcase layout only, not part of Web Expressive and not required for use. */
        @layer support {
            body {

                place-items: center;
            }

            .section {
                display: flex;
                flex-direction: column;
                gap: 1rem;
                padding-inline: 2rem;
                padding-block: 4rem;
                overflow-inline: auto;

            .headline {
