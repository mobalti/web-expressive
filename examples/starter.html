<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Expressive Starter</title>
    <meta name="description" content="A starter example for building with Web Expressive." />

    <!-- Typography -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400..600&display=swap" />

    <!-- Core (reset + essential tokens) -->
    <link rel="stylesheet" href="https://unpkg.com/web-expressive@0.5.0/dist/core.css" />

    <!-- Scheme -->

    <link rel="stylesheet" href="https://unpkg.com/web-expressive@0.5.0/dist/schemes/fuchsia-vibrant.css" />
    <!-- <link rel="stylesheet" href="https://unpkg.com/web-expressive@0.5.0/dist/schemes/porcelain-neutral.css" /> -->

    <!-- Available schemes: https://app.unpkg.com/web-expressive@0.5.0/files/dist/schemes -->
    <!-- Browse schemes: https://web-expressive-schemes.netlify.app/ -->

    <!-- Components -->
    <link rel="stylesheet" href="https://unpkg.com/web-expressive@0.5.0/dist/components/button.css" />

    <!-- Abstract Shapes -->
    <link rel="stylesheet" href="https://unpkg.com/web-expressive@0.5.0/dist/shapes/clip-tokens.css" />


    <style>
        .hero {
            /* color-scheme: dark; */
            min-block-size: 100svb;
            display: grid;

            /* window-medium-narrower */
            @media (width < 840px) {
                grid-template-rows: 1fr 100cqi;
            }

            /* window-expanded-wider */
            @media (width >=840px) {
                grid-template-columns: 1fr 1fr;
            }

        }

        .header {
            background: var(--sys-color-surface);
            color: var(--sys-color-on-surface);
            inline-size: 100%;
            padding: 4rem;
            place-items: center;
            display: grid;
            block-size: 100%;
            display: grid;

        }


        .wrapper {
            display: grid;
            gap: 1.5rem;
        }


        .heading {
            font: var(--sys-typescale-emphasized-display-medium);
            max-inline-size: 20ch;

            /* window-medium-wider */
            @media (width >=600px) {
                font: var(--sys-typescale-emphasized-display-large);

            }
        }

        .visual {
            container-type: inline-size;
            background: var(--sys-color-surface-container-lowest);

            display: grid;
            place-items: center;
            inline-size: 100%;
            block-size: 100%;

        }

        .container {
            inline-size: 65cqi;
            padding: 12cqi;

            color: var(--sys-color-on-primary-container);
            isolation: isolate;
            position: relative;

            /* window-expanded-wider */
            @media (width >=840px) {
                inline-size: 50cqi;
                padding: 10cqi;
            }

            &::before {
                z-index: -1;
                content: '';
                position: absolute;
                inset: 0;
                clip-path: var(--sys-shape-clip-9-sided-cookie);
                background: var(--sys-color-primary-container);
                display: block;
                animation: rotate 20s linear infinite;
            }
        }


        .logo {
            display: block;
            inline-size: 100%;
            block-size: 100%;

        }

        @keyframes rotate {
            to {
                rotate: 360deg;
            }
        }
    </style>
</head>

<body>
    <section class="hero">
        <header class="header">
            <div class="wrapper">
                <h1 class="heading">Web Expressive: UI you can feel</h1>
                <a href="https://github.com/mobalti/web-expressive" class="btn lg tonal" target="_blank">
                    Get started
                </a>
            </div>
        </header>

        <div class="visual">
            <div class="container">
                <svg class="logo" xmlns="http://www.w3.org/2000/svg" height="24" width="24" viewBox="0 -960 960 960"
                    fill="currentColor" role="img" aria-labelledby="logo-title">
                    <title id="logo-title">Web Expressive logo</title>
                    <path
                        d="M480-80 120-280v-400l360-200 360 200v400L480-80ZM364-590q23-24 53-37t63-13q33 0 63 13t53 37l120-67-236-131-236 131 120 67Zm76 396v-131q-54-14-87-57t-33-98q0-11 1-20.5t4-19.5l-125-70v263l240 133Zm96.5-229.5Q560-447 560-480t-23.5-56.5Q513-560 480-560t-56.5 23.5Q400-513 400-480t23.5 56.5Q447-400 480-400t56.5-23.5ZM520-194l240-133v-263l-125 70q3 10 4 19.5t1 20.5q0 55-33 98t-87 57v131Z" />
                </svg>
            </div>
        </div>
    </section>
</body>

</html>
