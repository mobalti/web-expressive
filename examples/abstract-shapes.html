<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Expressive | Abstract shapes</title>
    <meta name="description"
        content="Abstract shapes from Web Expressive, built with standard HTML and CSS for framework-agnostic use." />
    <!-- Typography -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400..600&display=swap" />

    <!-- Core (reset + essential tokens) -->
    <link rel="stylesheet" href="https://unpkg.com/web-expressive@0.5.0/dist/core.css" />

    <link rel="stylesheet" href="https://unpkg.com/web-expressive@0.5.0/dist/schemes/classic-tonal.css" />

    <link rel="stylesheet" href="https://unpkg.com/web-expressive@0.5.0/dist/shapes/clip-tokens.css" />

    <style>
        /* Showcase layout only, not part of Web Expressive and not required for use. */
        .section {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            max-inline-size: 100%;
            overflow-inline: auto;
        }

        .figure {
            display: grid;
            grid-template-rows: 1fr min-content;
            place-items: center;

            &:not(:nth-child(5n + 1)) {
                border-inline-start: 1px solid var(--sys-color-outline);
            }
        }

        .preview {
            clip-path: var(--_shape);
            background: var(--sys-color-primary);
            aspect-ratio: 1/1;
            inline-size: 80%;
        }

        .figcaption {
            border-block: 1px solid var(--sys-color-outline);
            padding: 0.75rem;
            inline-size: 100%;
            text-align: center;
            white-space: nowrap;
        }
    </style>
</head>
